services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # hot reload em dev
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./app/.env  # descomente se tiver variáveis de ambiente

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./nextjs:/app          # hot reload em dev
      - /app/node_modules      # preserva node_modules do container
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - BACKEND_URL=http://backend:8000
    env_file:
      - ./app/.env
    depends_on:
      - backend