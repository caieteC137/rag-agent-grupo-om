# Define o processo principal do nginx
events {
  # Número máximo de conexões simultâneas por worker
  worker_connections 1024;
}

http {
  server {
    # Nginx escuta na porta 80 — o link http://localhost
    listen 80;

    # Qualquer rota que começa com /api é redirecionada para o backend
    # Exemplo: http://localhost/api/chat → http://backend:8000/api/chat
    location /api {
      # Remove o /api antes de passar para o backend
      # Exemplo: /api/chat vira /chat para o backend
      rewrite ^/api(/.*)$ $1 break;

      # Encaminha para o container backend na porta 8000
      # "backend" é o nome do serviço no docker-compose
      proxy_pass http://backend:8000;

      # Passa os headers originais da requisição para o backend
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Qualquer outra rota vai para o frontend
    # Exemplo: http://localhost/ → http://frontend:3000/
    location / {
      # Encaminha para o container frontend na porta 3000
      # "frontend" é o nome do serviço no docker-compose
      proxy_pass http://frontend:3000;

      # Necessário para o hot reload do Next.js funcionar via WebSocket
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}